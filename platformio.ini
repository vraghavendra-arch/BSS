;-----------------------------------------

;  The  src_dir  is set to  bs_esp  which is the directory where the source code is located. The  lib_deps  is set to the  embedis  library. 
;  The  platform  is set to  espressif8266  and the  board  is set to  nodemcuv2 . The  framework  is set to  arduino . The  monitor_speed  and  upload_speed  are set to  115200 . The  build_flags  is set to  -DDEBUG_ESP_PORT=Serial . 
;  The  lib_deps  is set to  ${common.lib_deps}  which is the  embedis  library. 
;  The  platformio.ini  file is used to configure the PlatformIO project. 
;  The  bs_esp  directory contains the source code for the project. 
;  The  bs_esp  directory contains the following files: 
;  bs_esp.ino 
;  #include <Arduino.h>
