; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = bs_esp

[common]
lib_deps =
    https://github.com/thingSoC/Embedis
    https://github.com/sui77/rc-switch.git
;     https://github.com/marvinroger/async-mqtt-client.git
    https://github.com/thingSoC/embedis.git
    https://github.com/knolleary/pubsubclient.git
    https://github.com/adafruit/Adafruit_NeoPixel.git
    ArduinoJson
    LittleFs
    https://github.com/xoseperez/eeprom_rotate.git
    https://github.com/kiot-innovations/justwifi.git#ef4f222
    https://github.com/kiot-innovations/async-mqtt-client#2392687
    https://github.com/kiot-innovations/ESPAsyncTCP
    https://github.com/kiot-innovations/ESPAsyncWebServer
    https://github.com/kiot-innovations/debounceevent.git#8b567f0 
    https://github.com/kiot-innovations/mDNSResolver
    https://github.com/kiot-innovations/Cryptosuite.git#e845dfe
    https://github.com/kiot-innovations/AES.git#2f24726
    https://github.com/kiot-innovations/fauxmoesp.git
    Hash
    https://github.com/ayushsharma82/ElegantOTA.git#79c562e

shared_libdeps_dir= libraries/

[env]
lib_extra_dirs =
    ${common.shared_libdeps_dir}

[env:bct_3phase]
platform = espressif8266
board_build.partitions = huge_app
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 512000
build_flags = -DBCT_3PHASE=1
lib_deps =
        ${common.lib_deps}


